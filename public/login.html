<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Calculador de costos - Inicia sesión o regístrate">
  <title>Calculador de Costos - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-body">

  <div class="login-container">
    <!-- Logo / Brand -->
    <div class="login-brand">
      <div class="login-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <circle cx="24" cy="24" r="22" fill="url(#grad)" stroke="#e91e90" stroke-width="2"/>
          <text x="24" y="30" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">$</text>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48">
              <stop offset="0%" stop-color="#f8bbd0"/>
              <stop offset="100%" stop-color="#e91e90"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1>Calculador de Costos</h1>
      <p class="login-subtitle">Gestiona tus proyectos con facilidad</p>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="auth-form active">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="tu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="loginPassword">Contraseña</label>
        <input type="password" id="loginPassword" placeholder="••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">Iniciar Sesión</button>
      <p class="auth-switch">¿No tenés cuenta? <a href="#" id="showRegister">Registrate</a></p>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="auth-form">
      <div class="form-group">
        <label for="regName">Nombre</label>
        <input type="text" id="regName" placeholder="Tu nombre" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" placeholder="tu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="regPassword">Contraseña</label>
        <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="btn-primary" id="registerBtn">Crear Cuenta</button>
      <p class="auth-switch">¿Ya tenés cuenta? <a href="#" id="showLogin">Iniciá sesión</a></p>
    </form>

    <!-- Error message -->
    <div id="authError" class="auth-error" style="display:none;"></div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
